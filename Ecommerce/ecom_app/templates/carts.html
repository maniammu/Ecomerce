{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopX | Shopping Cart</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <nav>
        <div class="logo">Shop<span>X</span></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/products/">Products</a>
            <a href="/add_product/">Add Product</a>
            <a href="/about/">About</a>
        </div>
    </nav>

    <div class="section-header">
        <h1 class="title">Your Cart</h1>
    </div>

    <div class="cart-wrapper">
        <!-- ITEMS CONTAINER -->
        <div class="cart-items-panel">
            <!-- Simulated item structure (Wire this row to your backend dynamic Cart variables loop if built) -->
            <div class="cart-item-row">
                <div class="cart-item-info">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=120" alt="Sample Item">
                    <div>
                        <h3 style="font-size:18px; font-weight:700;">Premium Wireless Watch</h3>
                        <p style="color:var(--text-muted); font-size:13px;">Category: Gadgets</p>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 30px;">
                    <span style="font-weight:700; font-size:18px;">₹4,999</span>
                    <button class="delete-btn" style="padding: 6px 12px; font-size:12px;">Delete</button>
                </div>
            </div>
        </div>

        <!-- PRICING SUMMARY PANEL -->
        <div class="cart-summary-panel">
            <h2 style="font-size:22px; font-weight:800; margin-bottom:20px;">Order Summary</h2>
            <div class="summary-row">
                <span style="color:var(--text-muted);">Subtotal</span>
                <span style="font-weight:600;">₹4,999</span>
            </div>
            <div class="summary-row">
                <span style="color:var(--text-muted);">Estimated Delivery</span>
                <span style="color:var(--secondary); font-weight:600;">FREE</span>
            </div>
            <div class="summary-row summary-total">
                <span>Grand Total</span>
                <span>₹4,999</span>
            </div>
            <button class="buy-btn" style="width:100%; padding:14px; margin-top:20px; border-radius:10px;">Proceed to Checkout</button>
        </div>
    </div>

</body>
</html>
